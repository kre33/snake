<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <meta property="og:title" content="🐍 贪吃蛇 - 微信即玩">
    <meta property="og:description" content="手指滑动/摇杆控制方向，穿墙模式，越吃越快，无上限！">
    <meta property="og:type" content="game">
    <meta name="description" content="🐍 贪吃蛇小游戏 - 手指滑动/摇杆控制方向，穿墙模式，越吃越快，无上限！">

    <meta name="format-detection" content="telephone=no, email=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="color-scheme" content="dark dark">
    <meta name="referrer" content="never">

    <title>🐍 贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            -webkit-touch-callout: none;
        }
        body {
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 6px 10px;
            background: #16213e;
            flex-shrink: 0;
            border-bottom: 1px solid #0f3460;
        }
        .status-bar .item {
            text-align: center;
            min-width: 50px;
        }
        .status-bar .item .lbl {
            font-size: 9px;
            color: #666;
            letter-spacing: 1px;
            line-height: 1.3;
        }
        .status-bar .item .val {
            font-size: 17px;
            font-weight: bold;
            color: #00d4ff;
            line-height: 1.2;
        }
        .status-bar .item .val.high {
            color: #ffd700;
        }
        .btn-row {
            display: flex;
            gap: 8px;
            padding: 6px 10px;
            flex-shrink: 0;
            justify-content: center;
        }
        .btn-row .btn {
            flex: 1;
            max-width: 160px;
            padding: 8px 0;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            transition: none;
        }
        .btn-row .btn:active {
            opacity: 0.6;
        }
        .btn-start {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #fff;
        }
        .btn-pause {
            background: linear-gradient(135deg, #e94560, #c0392b);
            color: #fff;
        }
        .btn-pause:disabled {
            opacity: 0.25;
        }
        .game-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2px;
            min-height: 0;
        }
        .board-wrap {
            position: relative;
            width: 100%;
            max-width: min(86vmin, 400px);
            aspect-ratio: 1 / 1;
        }
        .board-wrap canvas {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 8px;
            background: #0a1a3a;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.75);
            border-radius: 8px;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #fff;
            font-size: 22px;
            font-weight: bold;
            gap: 6px;
        }
        .overlay.show {
            display: flex;
        }
        .overlay .sub {
            font-size: 12px;
            color: #999;
            font-weight: normal;
        }
        .bottom-bar {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4px 10px calc(8px + env(safe-area-inset-bottom));
            background: #16213e;
            border-top: 1px solid #0f3460;
        }
        .joy-wrap {
            width: 100%;
            max-width: 400px;
            touch-action: none;
        }
        .joy-wrap canvas {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 400 / 120;
            border-radius: 6px;
            background: #0a1a3a;
            touch-action: none;
        }
        .tip {
            color: #555;
            font-size: 9px;
            text-align: center;
            line-height: 1.3;
            margin-top: 2px;
        }
        .tip i {
            font-style: normal;
            color: #00d4ff;
        }
    </style>
</head>
<body>

<div class="status-bar">
    <div class="item">
        <div class="lbl">🏆 最高</div>
        <div class="val high" id="highScoreDisplay">0</div>
    </div>
    <div class="item">
        <div class="lbl">🎯 分数</div>
        <div class="val" id="scoreDisplay">0</div>
    </div>
    <div class="item">
        <div class="lbl">⚡ 速度</div>
        <div class="val" id="speedDisplay">1</div>
    </div>
    <div class="item">
        <div class="lbl">📏 长度</div>
        <div class="val" id="lengthDisplay">3</div>
    </div>
</div>

<div class="btn-row">
    <button class="btn btn-start" id="startBtn">开始游戏</button>
    <button class="btn btn-pause" id="pauseBtn" disabled>暂停</button>
</div>

<div class="game-area">
    <div class="board-wrap">
        <canvas id="board" width="400" height="400"></canvas>
        <div class="overlay" id="gameOverOverlay">
            GAME OVER
            <span class="sub">👆 点击「开始游戏」再来一局</span>
        </div>
    </div>
</div>

<div class="bottom-bar">
    <div class="joy-wrap">
        <canvas id="joystick" width="400" height="120"></canvas>
    </div>
    <div class="tip">
        🕹 拖拽摇杆控制方向 &nbsp;·&nbsp; 穿墙 · 不死
    </div>
</div>

<script>
    (function(){
        document.addEventListener('contextmenu', function(e){ e.preventDefault(); });

        var BOARD_SIZE = 20;
        var CELL_SIZE = 20;
        var BOARD_PX = 400;
        var GAP = 20;

        var canvas = document.getElementById('board');
        var ctx = canvas.getContext('2d');
        var joyCanvas = document.getElementById('joystick');
        var joyCtx = joyCanvas.getContext('2d');

        var scoreEl = document.getElementById('scoreDisplay');
        var highEl = document.getElementById('highScoreDisplay');
        var speedEl = document.getElementById('speedDisplay');
        var lenEl = document.getElementById('lengthDisplay');
        var startBtn = document.getElementById('startBtn');
        var pauseBtn = document.getElementById('pauseBtn');
        var overlay = document.getElementById('gameOverOverlay');

        var snake = [];
        var food = null;
        var score = 0;
        var highScore = parseInt(localStorage.getItem('wxSnakeHigh') || '0');
        var speed = 1;
        var over = false;
        var paused = false;
        var started = false;
        var loop = null;
        var dir = { dx: 1, dy: 0 };
        var trail = [];

        /* 摇杆 - 居中加大 */
        var JR = 82;
        var JC = { x: 200, y: 55 };
        var knob = { x: JC.x, y: JC.y };
        var joyActive = false;
        var joyId = null;

        highEl.textContent = highScore;

        function getSpeed() { return 3 + (speed - 1) * 0.3; }

        function wrapD(dx, dy) {
            var wx = ((dx % BOARD_PX) + BOARD_PX) % BOARD_PX;
            var wy = ((dy % BOARD_PX) + BOARD_PX) % BOARD_PX;
            if (wx > BOARD_PX / 2) wx -= BOARD_PX;
            if (wy > BOARD_PX / 2) wy -= BOARD_PX;
            return { dx: wx, dy: wy };
        }

        function getTrailPos(dist) {
            var acc = 0;
            for (var i = trail.length - 1; i >= 1; i--) {
                var a = trail[i], b = trail[i-1];
                var d = Math.sqrt((a.x-b.x)*(a.x-b.x)+(a.y-b.y)*(a.y-b.y));
                if (acc + d >= dist) {
                    var t = (dist - acc) / d;
                    return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t };
                }
                acc += d;
            }
            return { x: trail[0].x, y: trail[0].y };
        }

        function spawnFood() {
            var cx, cy, ok;
            for (var attempt = 0; attempt < 1000; attempt++) {
                cx = Math.floor(Math.random() * BOARD_SIZE) * CELL_SIZE + CELL_SIZE / 2;
                cy = Math.floor(Math.random() * BOARD_SIZE) * CELL_SIZE + CELL_SIZE / 2;
                ok = true;
                for (var j = 0; j < snake.length; j++) {
                    if (Math.abs(snake[j].x - cx) < CELL_SIZE && Math.abs(snake[j].y - cy) < CELL_SIZE) {
                        ok = false;
                        break;
                    }
                }
                if (ok) { food = { x: cx, y: cy }; return; }
            }
        }

        function drawHead(cx, cy) {
            var r = CELL_SIZE / 2;
            var g = ctx.createRadialGradient(cx, cy, 2, cx, cy, r);
            g.addColorStop(0, '#7bedff');
            g.addColorStop(1, '#2196F3');
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.arc(cx - 4, cy - 4, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawBody(wrapped, copies) {
            var BR = CELL_SIZE / 2 - 2;
            var LW = CELL_SIZE - 4;
            var color = '#3ddc84';

            for (var i = 0; i < wrapped.length; i++) {
                var p = wrapped[i];
                ctx.beginPath();
                ctx.arc(p.x, p.y, BR, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.strokeStyle = color;
            ctx.lineWidth = LW;
            ctx.lineCap = 'round';
            for (var i = 1; i < wrapped.length; i++) {
                var a = wrapped[i-1], b = wrapped[i];
                var dx = b.x - a.x, dy = b.y - a.y;
                if (Math.abs(dx) <= BOARD_PX / 2 && Math.abs(dy) <= BOARD_PX / 2) {
                    ctx.beginPath();
                    ctx.moveTo(a.x, a.y);
                    ctx.lineTo(b.x, b.y);
                    ctx.stroke();
                }
            }

            drawHead(wrapped[0].x, wrapped[0].y);

            ctx.fillStyle = color;
            for (var i = 0; i < copies.length; i++) {
                var cp = copies[i];
                if (cp.i === 0) {
                    drawHead(cp.x, cp.y);
                } else {
                    ctx.beginPath();
                    ctx.arc(cp.x, cp.y, BR, 0, Math.PI * 2);
                    ctx.fill();
                }
                if (cp.prevI >= 0) {
                    var prev = wrapped[cp.prevI];
                    var dx = cp.x - prev.x, dy = cp.y - prev.y;
                    if (Math.abs(dx) <= BOARD_PX / 2 && Math.abs(dy) <= BOARD_PX / 2) {
                        ctx.strokeStyle = color;
                        ctx.lineWidth = LW;
                        ctx.lineCap = 'round';
                        ctx.beginPath();
                        ctx.moveTo(prev.x, prev.y);
                        ctx.lineTo(cp.x, cp.y);
                        ctx.stroke();
                    }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, 400, 400);
            ctx.fillStyle = '#0a1a3a';
            ctx.fillRect(0, 0, 400, 400);

            if (food) {
                var g = ctx.createRadialGradient(food.x, food.y, 2, food.x, food.y, CELL_SIZE/2);
                g.addColorStop(0, '#ff6b81');
                g.addColorStop(1, '#e94560');
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.arc(food.x, food.y, CELL_SIZE/2 - 2, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.arc(food.x - 3, food.y - 3, 3, 0, Math.PI*2);
                ctx.fill();
            }

            var wrapped = [], copies = [];
            for (var i = 0; i < snake.length; i++) {
                var s = snake[i];
                var bw = ((s.x % BOARD_PX) + BOARD_PX) % BOARD_PX;
                var bh = ((s.y % BOARD_PX) + BOARD_PX) % BOARD_PX;
                wrapped.push({ x: bw, y: bh });
                var pi = i - 1;
                if (bw < CELL_SIZE) { copies.push({ x: bw + BOARD_PX, y: bh, i: i, prevI: pi }); }
                else if (bw > BOARD_PX - CELL_SIZE) { copies.push({ x: bw - BOARD_PX, y: bh, i: i, prevI: pi }); }
                if (bh < CELL_SIZE) { copies.push({ x: bw, y: bh + BOARD_PX, i: i, prevI: pi }); }
                else if (bh > BOARD_PX - CELL_SIZE) { copies.push({ x: bw, y: bh - BOARD_PX, i: i, prevI: pi }); }
            }

            drawBody(wrapped, copies);

            if (paused && !over) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, 400, 400);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 36px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('⏸ 暂停', 200, 200);
            }
        }

        function drawJoy() {
            joyCtx.clearRect(0, 0, 400, 120);
            joyCtx.fillStyle = '#0a1a3a';
            joyCtx.fillRect(0, 0, 400, 120);

            joyCtx.strokeStyle = '#0f3460';
            joyCtx.lineWidth = 2;
            joyCtx.beginPath();
            joyCtx.arc(JC.x, JC.y, JR, 0, Math.PI*2);
            joyCtx.stroke();

            joyCtx.strokeStyle = 'rgba(0,212,255,0.12)';
            joyCtx.lineWidth = 1;
            joyCtx.beginPath();
            joyCtx.arc(JC.x, JC.y, JR*0.6, 0, Math.PI*2);
            joyCtx.stroke();

            var dx = knob.x - JC.x, dy = knob.y - JC.y;
            if (Math.abs(dx) > 2 || Math.abs(dy) > 2) {
                joyCtx.strokeStyle = 'rgba(0,212,255,0.18)';
                joyCtx.lineWidth = 3;
                joyCtx.beginPath();
                joyCtx.moveTo(JC.x, JC.y);
                joyCtx.lineTo(JC.x + dx*1.8, JC.y + dy*1.8);
                joyCtx.stroke();
                joyCtx.fillStyle = 'rgba(0,212,255,0.12)';
                joyCtx.beginPath();
                joyCtx.arc(JC.x + dx*1.8, JC.y + dy*1.8, 5, 0, Math.PI*2);
                joyCtx.fill();
            }

            var g = joyCtx.createRadialGradient(knob.x, knob.y, 2, knob.x, knob.y, 24);
            g.addColorStop(0, '#00d4ff');
            g.addColorStop(1, '#0099cc');
            joyCtx.fillStyle = g;
            joyCtx.beginPath();
            joyCtx.arc(knob.x, knob.y, 24, 0, Math.PI*2);
            joyCtx.fill();

            joyCtx.fillStyle = 'rgba(255,255,255,0.2)';
            joyCtx.beginPath();
            joyCtx.arc(knob.x - 6, knob.y - 6, 6, 0, Math.PI*2);
            joyCtx.fill();

            joyCtx.fillStyle = '#555';
            joyCtx.font = '12px sans-serif';
            joyCtx.textAlign = 'center';
            joyCtx.textBaseline = 'middle';
            joyCtx.fillText('🕹', 200, JC.y + JR + 22);
        }

        function update() {
            var spd = getSpeed();
            snake[0].x += dir.dx * spd;
            snake[0].y += dir.dy * spd;
            trail.push({ x: snake[0].x, y: snake[0].y });

            for (var i = 1; i < snake.length; i++) {
                var pos = getTrailPos(GAP * i);
                snake[i].x = pos.x;
                snake[i].y = pos.y;
            }

            if (trail.length > snake.length * 4) {
                trail.splice(0, trail.length - snake.length * 4);
            }

            var fd = wrapD(snake[0].x - food.x, snake[0].y - food.y);
            if (Math.sqrt(fd.dx*fd.dx + fd.dy*fd.dy) < 12) {
                score += 10;
                speed = Math.floor((snake.length - 3) / 2) + 1;
                updateUI();
                var pos = getTrailPos(GAP * snake.length + 5);
                snake.push({ x: pos.x, y: pos.y });
                spawnFood();
            }

            draw();
        }

        function endGame() {
            over = true;
            overlay.classList.add('show');
            clearInterval(loop); loop = null;
            pauseBtn.disabled = true;
            joyActive = false;
            knob.x = JC.x; knob.y = JC.y;
            drawJoy();
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('wxSnakeHigh', highScore);
                highEl.textContent = highScore;
            }
        }

        function togglePause() {
            if (over || !started) return;
            paused = !paused;
            pauseBtn.textContent = paused ? '▶ 继续' : '⏸ 暂停';
            draw();
            drawJoy();
        }

        function initGame() {
            snake = [
                { x: 200, y: 200 },
                { x: 180, y: 200 },
                { x: 160, y: 200 }
            ];
            trail = [];
            var h = snake[0];
            for (var d = 0; d < snake.length * GAP; d += 2) {
                trail.push({ x: h.x - d, y: h.y });
            }
            dir = { dx: 1, dy: 0 };
            score = 0; speed = 1;
            over = false; paused = false; started = true;
            overlay.classList.remove('show');
            spawnFood();
            updateUI();
            pauseBtn.disabled = false;
            pauseBtn.textContent = '⏸ 暂停';
            if (loop) { clearInterval(loop); }
            loop = setInterval(function(){
                if (!paused && !over) update();
            }, 1000/60);
            draw();
            drawJoy();
        }

        function updateUI() {
            scoreEl.textContent = score;
            speedEl.textContent = speed;
            lenEl.textContent = snake.length;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('wxSnakeHigh', highScore);
                highEl.textContent = highScore;
            }
        }

        function updateJoy(clientX, clientY) {
            var rect = joyCanvas.getBoundingClientRect();
            var px = (clientX - rect.left) * (400 / rect.width);
            var py = (clientY - rect.top) * (120 / rect.height);
            var dx = px - JC.x, dy = py - JC.y;
            var dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 8) {
                knob.x = JC.x; knob.y = JC.y;
                return;
            }
            var clamped = Math.min(dist, JR);
            var nx = dx/dist, ny = dy/dist;
            knob.x = JC.x + nx * clamped;
            knob.y = JC.y + ny * clamped;
            var strength = Math.max(0.15, clamped / JR);
            dir.dx = nx * strength;
            dir.dy = ny * strength;
            var len = Math.sqrt(dir.dx*dir.dx + dir.dy*dir.dy);
            if (len > 0) { dir.dx /= len; dir.dy /= len; }
        }

        function onJoyDown(e) {
            if (!started || over || paused) return;
            e.preventDefault();
            joyActive = true;
            joyId = e.pointerId;
            joyCanvas.setPointerCapture(joyId);
            updateJoy(e.clientX, e.clientY);
            drawJoy();
        }
        function onJoyMove(e) {
            if (!joyActive || e.pointerId !== joyId) return;
            e.preventDefault();
            updateJoy(e.clientX, e.clientY);
            drawJoy();
        }
        function onJoyUp(e) {
            if (e.pointerId !== joyId) return;
            e.preventDefault();
            joyActive = false;
            joyId = null;
            knob.x = JC.x; knob.y = JC.y;
            drawJoy();
        }
        joyCanvas.addEventListener('pointerdown', onJoyDown);
        joyCanvas.addEventListener('pointermove', onJoyMove);
        joyCanvas.addEventListener('pointerup', onJoyUp);
        joyCanvas.addEventListener('pointercancel', onJoyUp);

        joyCanvas.addEventListener('touchstart', function(e){
            if (joyActive) return;
            if (!started || over || paused) return;
            e.preventDefault();
            var t = e.touches[0];
            joyActive = true;
            updateJoy(t.clientX, t.clientY);
            drawJoy();
        }, { passive: false });
        joyCanvas.addEventListener('touchmove', function(e){
            if (!joyActive) return;
            e.preventDefault();
            var t = e.touches[0];
            updateJoy(t.clientX, t.clientY);
            drawJoy();
        }, { passive: false });
        joyCanvas.addEventListener('touchend', function(e){
            if (!joyActive) return;
            e.preventDefault();
            joyActive = false;
            knob.x = JC.x; knob.y = JC.y;
            drawJoy();
        }, { passive: false });

        startBtn.addEventListener('click', initGame);
        pauseBtn.addEventListener('click', togglePause);

        document.addEventListener('keydown', function(e){
            if (!started || over) return;
            if (e.key === ' ') { e.preventDefault(); togglePause(); }
        });

        draw();
        drawJoy();
    })();
</script>
</body>
</html>
